services:
  # Flask JSON API — serves /api/data to the React frontend
  - type: web
    name: upi-fraud-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn consumer.app:app
    envVars:
      - key: MONGO_URI
        sync: false          # paste your MongoDB Atlas connection string
      - key: RABBITMQ_URL
        sync: false          # paste your CloudAMQP connection string

  # Generator — publishes simulated UPI transactions to RabbitMQ.
  # Declared as `web` (not `worker`) so it's free-tier eligible: Render
  # removed free background workers in 2026. The actual generator loop
  # runs in a background thread; gunicorn just serves a health-check route.
  # --workers 1 is required — more workers would each spawn their own
  # duplicate generator thread, producing multiple transactions per tick.
  - type: web
    name: upi-fraud-generator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 2 generator.generate:app
    envVars:
      - key: RABBITMQ_URL
        sync: false

  # Consumer — scores transactions (model + SHAP) and writes to Atlas.
  # Same free-tier workaround as the generator above.
  - type: web
    name: upi-fraud-consumer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 2 consumer.consumer:app
    envVars:
      - key: RABBITMQ_URL
        sync: false
      - key: MONGO_URI
        sync: false

  # React dashboard — static site, built separately (see dashboard-frontend/)
  - type: web
    name: upi-fraud-dashboard
    env: static
    buildCommand: cd dashboard-frontend && npm install && npm run build
    staticPublishPath: dashboard-frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to the upi-fraud-api service's URL
    routes:
      # SPA rewrite: without this, deep links like /transactions or a
      # browser refresh on any non-root route 404 on Render's static
      # host, since there's no matching file at that path — only
      # index.html, which client-side React Router then takes over from.
      - type: rewrite
        source: /*
        destination: /index.html
